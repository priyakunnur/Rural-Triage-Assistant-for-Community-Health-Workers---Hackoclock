<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="6" dy="10" stdDeviation="8" flood-color="#a0d9c8" flood-opacity="0.7"/>
      <feDropShadow dx="-6" dy="-6" stdDeviation="8" flood-color="#ffffff" flood-opacity="0.9"/>
    </filter>
  </defs>
  
  <!-- App Icon Background -->
  <rect width="256" height="256" rx="56" fill="#cbf4e6" />
  
  <!-- Neumorphic Medical Cross -->
  <path d="M 104 48 L 152 48 L 152 104 L 208 104 L 208 152 L 152 152 L 152 208 L 104 208 L 104 152 L 48 152 L 48 104 L 104 104 Z" 
        fill="#cbf4e6" filter="url(#softShadow)" />
        
  <!-- White Heart -->
  <path d="M 128 78 C 128 78 114 62 104 68 C 94 74 96 88 108 98 L 128 116 L 148 98 C 160 88 162 74 152 68 C 142 62 128 78 128 78 Z" 
        fill="#ffffff" />
        
  <!-- Rod of Asclepius (Teal) -->
  <!-- Main vertical staff -->
  <line x1="124" y1="180" x2="124" y2="120" stroke="#00a88f" stroke-width="7" stroke-linecap="round"/>
  <!-- Tilted handle part -->
  <line x1="124" y1="120" x2="150" y2="105" stroke="#00a88f" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Snake Winding -->
  <path d="M 118 113 C 90 117 90 145 124 150 C 158 155 158 180 124 185 C 105 188 105 175 105 175" 
        fill="none" stroke="#00a88f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        
  <!-- Snake Head Eye/Dot -->
  <circle cx="118" cy="113" r="3.5" fill="#ffffff" />
</svg>
